version: '3.8'

services:
  # MongoDB 数据库
  mongodb:
    image: mongo:6.0
    container_name: ideal-market-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: ideal_market
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - ideal-market-network

  # Redis 缓存和任务队列
  redis:
    image: redis:7-alpine
    container_name: ideal-market-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ideal-market-network

  # RabbitMQ 消息队列
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: ideal-market-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - ideal-market-network

  # 后端API服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ideal-market-backend
    restart: unless-stopped
    depends_on:
      - mongodb
      - redis
      - rabbitmq
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URI=mongodb://admin:password123@mongodb:27017/ideal_market?authSource=admin
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://admin:password123@rabbitmq:5672
      - JWT_SECRET=your-jwt-secret-key-change-in-production
      - WECHAT_APP_ID=your-wechat-app-id
      - WECHAT_APP_SECRET=your-wechat-app-secret
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - ideal-market-network

  # Web前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ideal-market-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - ideal-market-network

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: ideal-market-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./ssl:/etc/nginx/ssl
    networks:
      - ideal-market-network

volumes:
  mongodb_data:
  redis_data:
  rabbitmq_data:

networks:
  ideal-market-network:
    driver: bridge